name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Version consistency (manifest.json == package.json)
        run: |
          M=$(node -p "require('./manifest.json').version")
          P=$(node -p "require('./package.json').version")
          echo "manifest=$M package=$P"
          test "$M" = "$P"
